<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Feliz Cumpleaños</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="mobile.css"
      media="only screen and (max-width: 768px)"
    />
  </head>
  <body>
    <canvas id="canvas1"></canvas>

    <div class="contenedor">
      <div class="portaretrato-torta-caja">

        <div class="portaretrato">
          <div class="marco">
            <img src="/recursos/cumpleañera.jpg" alt="Foto" />
          </div>
          <div class="soporte-marco"></div>
        </div>

        <div class="torta-cumpleaños">
          <div class="torta">
            <div class="chocolate"></div>
          </div>
          <div class="vela"></div>
          <div class="llama"></div>
        </div>

        <div class="caja-wrapper">
          <div class="caja">
            <div class="cinta-de-regalo">
              <div class="cinta-de-regalo-izquierda"></div>
              <div class="cinta-de-regalo-derecha"></div>
              <div class="cinta-de-regalo-centro"></div>
            </div>
            <div class="regalos">
              <div class="regalo-sombra"></div>
            </div>
            <div class="regalo"></div>
            <div class="icono-estrella estrella1"></div>
            <div class="icono-estrella estrella2"></div>
            <div class="icono-estrella estrella3"></div>
            <div class="icono-estrella estrella4"></div>
            <div class="icono-estrella estrella5"></div>
          </div>
        </div>

        <div class="happy-birthday">Happy Birthday</div>

        <div class="happy-birthday-2" id="nombreMajo">
          <span class="letra" data-frase="Me has enseñado que la amistad real sí existe.">M</span>
          <span class="letra" data-frase="Agradezco cada consejo que me diste.">A</span>
          <span class="letra" data-frase="Jamás olvidaré los momentos que compartimos.">J</span>
          <span class="letra" data-frase="Ojalá siempre sigamos riéndonos como siempre.">O</span>
        </div>

      </div>

      <div class="soporte"></div>
      <div id="fraseMostrada" class="frase-oculta"></div>
    </div>

 
    <div class="modal-carta" id="modalCarta">
      <div class="contenido-carta">
        <div class="carta">
          <h2>Querida Majo</h2>

    
          <div id="contenidoCarta"></div>

        
          <div class="paginacion">
            <button id="prevBtn">⬅</button>
            <span id="numeroPagina">1 / 1</span>
            <button id="nextBtn">➡</button>
          </div>


          <p class="firma">Con cariño,<br />Angel</p>

        </div>
      </div>
    </div>

    <div class="modal-video" id="modalVideo">
      <div class="contenido-video">
        <video id="videoCumple" controls>
          <source src="/recursos/video.mp4" type="video/mp4" />
        </video>
      </div>
    </div>

    <canvas id="canvas2"></canvas>

    <audio id="soplido" src="/recursos/soplar1.mp3" preload="auto"></audio>
    <audio id="cancion" src="/recursos/cancion.mp3" preload="auto"></audio>

    <div class="overlay"></div>

    <script src="Confeti.js"></script>
    <script src="Confeti2.js"></script>
    <script src="Sorpresa.js"></script>
  </body>
</html>
