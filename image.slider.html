<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuerdos-majo</title>
  <link rel="stylesheet" href="slider.css">
</head>
<body>

  <main class="main">

    <div class="cards">
      <div class="cards__inner">

        <div class="card">
          <img src="recursos/carrousel-4.jpeg" alt="Image 1">
        </div>

        <div class="card">
          <img src="/recursos/carrousel-2.jpeg" alt="Image 2">
        </div>

        <div class="card">
          <img src="/recursos/carrousel-1.jpg" alt="Image 3">
        </div>

        <div class="card">
          <img src="/recursos/carrousel-3.png" alt="Image 4">
        </div>

        <div class="card">
          <img src="/recursos/carrousel-5.jpeg" alt="Image 5">
        </div>

      </div>
    </div>
    <div class="modal" id="modalRecuerdo">
        <div class="modal-contenido">
            <h2 id="modalTitulo"></h2>
            <p id="modalTexto"></p>
        </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="gsap.js"></script>

</body>

</html>
